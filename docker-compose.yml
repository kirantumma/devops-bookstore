version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bookstore_user
      POSTGRES_PASSWORD: bookstore_pass
      POSTGRES_DB: bookstore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore_user -d bookstore"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Book Service (Flask)
  book-service:
    build: ./apps/book-service
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://bookstore_user:bookstore_pass@db:5432/bookstore
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Order Service (Express)
  order-service:
    build: ./apps/order-service
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://bookstore_user:bookstore_pass@db:5432/bookstore
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (React + Nginx)
  frontend:
    build: ./apps/frontend
    ports:
      - "3000:80"
    depends_on:
      - book-service
      - order-service
    restart: unless-stopped

volumes:
  pgdata:

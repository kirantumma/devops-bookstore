apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service
  namespace: bookstore
  labels:
    app: book-service
spec:
  replicas: {{ .Values.bookService.replicaCount }}
  selector:
    matchLabels:
      app: book-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: book-service
    spec:
      containers:
        - name: book-service
          image: "{{ .Values.bookService.image.repository }}:{{ .Values.bookService.image.tag }}"
          ports:
            - containerPort: {{ .Values.bookService.port }}
          resources:
            {{- toYaml .Values.bookService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.bookService.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.bookService.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
